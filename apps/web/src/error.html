<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>%sveltekit.error.message%</title>
		<style>
			:root {
				color-scheme: light dark;
				--canvas: #ffffff;
				--ink: #111113;
				--ink-muted: #6b6b71;
				--border: #e7e7ea;
			}
			@media (prefers-color-scheme: dark) {
				:root {
					--canvas: #0b0b0c;
					--ink: #f2f2f3;
					--ink-muted: #9a9aa1;
					--border: #27272b;
				}
			}
			body {
				margin: 0;
				min-height: 100vh;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				gap: 1rem;
				padding: 1.5rem;
				text-align: center;
				background: var(--canvas);
				color: var(--ink);
				font-family:
					ui-sans-serif,
					system-ui,
					-apple-system,
					'Segoe UI',
					Roboto,
					Helvetica,
					Arial,
					sans-serif;
			}
			.status {
				font-size: 0.875rem;
				font-weight: 500;
				color: var(--ink-muted);
			}
			h1 {
				font-size: 1.5rem;
				font-weight: 600;
				margin: 0;
			}
			p {
				color: var(--ink-muted);
				max-width: 32rem;
			}
			a {
				margin-top: 1rem;
				display: inline-block;
				border: 1px solid var(--border);
				border-radius: 9999px;
				padding: 0.5rem 1.25rem;
				font-size: 0.875rem;
				color: var(--ink-muted);
				text-decoration: none;
			}
			a:hover {
				border-color: var(--ink);
				color: var(--ink);
			}
		</style>
	</head>
	<body>
		<p class="status">%sveltekit.status%</p>
		<h1>Couldn't load this site</h1>
		<p>%sveltekit.error.message%</p>
		<a href="/">Try again</a>
	</body>
</html>
